interface:
  display_name: "GPT Web Fix Flow"
  short_description: "Package project context for GPT Web"
  default_prompt: "Use $gpt-web-fix-flow to resolve the configured Oracle runtime case, package bounded project context, send it to GPT Web with task-specific prompt requirements and the required updated zip output, wait normally for the response artifact, then apply the returned zip when Oracle materializes a valid local or cloud-readable artifact."
